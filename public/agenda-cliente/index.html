<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agendar Sessão</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --plum:     #14392F;
      --rose:     #75553C;
      --lavender: #CEBDB0;
      --sage:     #2A6B4A;
      --muted:    #9B8A7E;
      --border:   #D4C8BE;
      --bg:       #EBEBEB;
    }
    body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--plum); font-size:15px; min-height:100vh; padding-bottom:60px; }

    /* Header */
    .header { background:linear-gradient(135deg,#14392F 0%,#1e4d3f 100%); padding:28px 32px 22px; text-align:center; color:#fff; }
    .header h1 { font-size:10px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,.7); margin-bottom:4px; }
    .header .nome { font-size:18px; font-weight:800; }
    .header .crp  { font-size:12px; color:rgba(255,255,255,.6); margin-top:2px; }

    .hero { background:linear-gradient(90deg,#F5EDE7,#EDE5DC); padding:14px 32px; border-bottom:2px solid var(--border); text-align:center; }
    .hero p { font-size:13.5px; color:var(--muted); }

    /* Container */
    .container { max-width:1060px; margin:0 auto; padding:24px 16px; }

    /* Week nav */
    .week-nav { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; background:#fff; border-radius:12px; border:1.5px solid var(--border); padding:10px 16px; box-shadow:0 2px 8px rgba(20,57,47,.05); }
    .nav-btn { background:none; border:1.5px solid var(--border); border-radius:8px; padding:6px 16px; cursor:pointer; font-size:14px; color:var(--plum); font-weight:600; transition:all .15s; white-space:nowrap; }
    .nav-btn:hover:not(:disabled) { border-color:var(--rose); color:var(--rose); }
    .nav-btn:disabled { opacity:.3; cursor:default; }
    .sem-label { font-size:14px; font-weight:700; color:var(--plum); text-align:center; flex:1; }

    /* Toggle de visão */
    .view-toggle { display:flex; gap:6px; background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:4px; margin-bottom:16px; width:fit-content; }
    .view-btn { padding:6px 16px; border-radius:7px; border:none; background:none; cursor:pointer; font-size:13px; font-weight:600; color:var(--muted); transition:all .15s; }
    .view-btn.active { background:linear-gradient(135deg,#75553C,#5a3f2a); color:#fff; }

    /* ─── VISÃO CARDS (original) ─────────────────────────── */
    .semana-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
    .dia-col { background:#fff; border-radius:12px; border:1.5px solid var(--border); overflow:visible; }
    .dia-col.passado { opacity:.5; }
    .dia-col.hoje { border-color:var(--rose); box-shadow:0 0 0 2px rgba(117,85,60,.15); }
    .dia-header { border-radius:12px 12px 0 0; overflow:hidden; padding:10px 6px 8px; text-align:center; border-bottom:1px solid var(--border); background:#F0E8E0; }
    .dia-col.hoje .dia-header { background:linear-gradient(135deg,#75553C,#14392F); }
    .dia-header .dow { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
    .dia-col.hoje .dia-header .dow,
    .dia-col.hoje .dia-header .data-num,
    .dia-col.hoje .dia-header .data-mes { color:#fff; }
    .dia-header .data-num { font-size:18px; font-weight:800; color:var(--plum); line-height:1.2; margin-top:3px; }
    .dia-header .data-mes { font-size:10px; color:var(--muted); }
    .dia-slots { padding:8px 6px; display:flex; flex-direction:column; gap:5px; min-height:60px; }
    .dia-vazio { padding:20px 4px; text-align:center; color:var(--muted); font-size:12px; }

    /* ─── VISÃO GRADE ────────────────────────────────────── */
    .grade-wrap { overflow-x:auto; background:#fff; border-radius:14px; border:1.5px solid var(--border); box-shadow:0 2px 8px rgba(20,57,47,.05); }
    .grade-table { width:100%; border-collapse:collapse; min-width:560px; table-layout:fixed; font-size:13px; }
    .grade-table thead th {
      background:linear-gradient(90deg,#F5EDE7,#EDE0D5);
      padding:10px 6px; font-size:10.5px; font-weight:700;
      text-transform:uppercase; letter-spacing:.6px; color:var(--muted);
      border-bottom:2px solid var(--border); text-align:center; white-space:nowrap;
    }
    .grade-table thead th.hoje { background:linear-gradient(135deg,#75553C,#14392F); color:#fff; }
    .grade-table thead th.hora-th { width:52px; background:var(--bg); }
    .grade-hora {
      font-size:11px; font-weight:700; color:var(--muted);
      padding:3px 8px 0; text-align:right; white-space:nowrap;
      vertical-align:top; background:var(--bg);
      border-right:2px solid var(--border);
    }
    .grade-row-h td { border-top:1.5px solid var(--border); }
    .grade-row-m td { border-top:1px dashed rgba(212,200,190,.55); }
    .grade-cell { padding:3px; height:44px; vertical-align:middle; text-align:center; }
    .grade-break td {
      background:var(--bg); padding:5px 10px; text-align:center;
      font-size:10.5px; font-weight:700; color:var(--muted); letter-spacing:.8px;
      border-top:2px solid var(--border); border-bottom:2px solid var(--border);
    }
    .grade-table thead th.dom-th { width:38px; background:var(--bg); font-size:9px; }

    /* Slot buttons na grade */
    .slot-livre {
      display:block; width:100%; padding:6px 2px; text-align:center;
      background:linear-gradient(135deg,#dff0e7,#c5e4d2);
      color:#1e4d36; border:1.5px solid #9fcfb4; border-radius:7px;
      font-size:12px; font-weight:700; cursor:pointer; transition:all .15s;
    }
    .slot-livre:hover { background:linear-gradient(135deg,#c5e4d2,#9fcfb4); transform:scale(1.03); }
    .slot-ocupado {
      display:block; width:100%; padding:6px 2px; text-align:center;
      background:#F0E8E0; color:#C0A898; border:1.5px solid var(--border);
      border-radius:7px; font-size:10.5px; font-weight:600; cursor:default;
    }
    .grade-cell.passado .slot-livre,
    .grade-cell.passado { opacity:.35; pointer-events:none; }

    /* Loading */
    .loading { text-align:center; padding:64px 20px; color:var(--muted); font-size:15px; }

    /* Modal */
    .modal-overlay {
      display:none; position:fixed; inset:0; z-index:900;
      background:rgba(20,57,47,.55); backdrop-filter:blur(3px);
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#fff; border-radius:18px; box-shadow:0 20px 60px rgba(20,57,47,.28); width:100%; max-width:440px; overflow:hidden; }
    .modal-head { background:linear-gradient(135deg,#14392F,#1e4d3f); padding:22px 28px; color:#fff; }
    .modal-head h3 { font-size:17px; font-weight:800; }
    .modal-head .resumo { font-size:13px; color:rgba(255,255,255,.75); margin-top:5px; }
    .modal-body { padding:24px 28px; }
    .fg { display:flex; flex-direction:column; gap:5px; margin-bottom:16px; }
    .fg label { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
    .fg input { border:1.5px solid var(--border); border-radius:8px; padding:11px 13px; font-family:inherit; font-size:14.5px; color:var(--plum); background:#fff; transition:border-color .15s; }
    .fg input:focus { outline:none; border-color:var(--rose); box-shadow:0 0 0 3px rgba(117,85,60,.12); }
    .fg.erro input { border-color:#c0425d; }
    .fg.erro .errmsg { display:block; }
    .errmsg { display:none; color:#c0425d; font-size:12px; margin-top:2px; }
    .modal-footer { display:flex; gap:10px; margin-top:6px; }
    .btn-cancel { flex:1; padding:12px; border:1.5px solid var(--border); border-radius:10px; background:#fff; color:var(--muted); font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; }
    .btn-cancel:hover { border-color:var(--rose); color:var(--rose); }
    .btn-confirmar { flex:2; padding:12px; background:linear-gradient(135deg,#75553C,#5a3f2a); color:#fff; border:none; border-radius:10px; font-size:14.5px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(117,85,60,.35); transition:all .15s; }
    .btn-confirmar:hover:not(:disabled) { transform:translateY(-1px); }
    .btn-confirmar:disabled { opacity:.6; cursor:not-allowed; transform:none; }

    @media(max-width:760px) {
      .semana-grid { grid-template-columns:repeat(3,1fr); }
      .header { padding:20px 16px 16px; }
    }
    @media(max-width:440px) {
      .semana-grid { grid-template-columns:repeat(2,1fr); }
      .container { padding:16px 10px; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Consultório de Psicologia</h1>
  <div class="nome" id="h-nome">Carregando...</div>
  <div class="crp"  id="h-crp"></div>
</div>

<div class="hero">
  <p>Selecione um horário disponível para agendar sua sessão.</p>
</div>

<div class="container">
  <div class="loading" id="loading">⏳ Carregando agenda...</div>

  <div id="main" style="display:none">
    <div class="week-nav">
      <button class="nav-btn" id="btn-ant"  onclick="navSem(-1)">&#8249; Anterior</button>
      <span class="sem-label" id="sem-label"></span>
      <button class="nav-btn" id="btn-prox" onclick="navSem(1)">Próxima &#8250;</button>
    </div>

    <!-- Toggle de visão -->
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-grade" onclick="setView('grade')">📅 Grade</button>
      <button class="view-btn"        id="btn-view-cards" onclick="setView('cards')">🗂️ Cards</button>
    </div>

    <!-- Visão Grade -->
    <div id="view-grade">
      <div class="grade-wrap">
        <table class="grade-table" id="grade-table"></table>
      </div>
    </div>

    <!-- Visão Cards (original) -->
    <div id="view-cards" style="display:none">
      <div class="semana-grid" id="semana-grid"></div>
    </div>
  </div>
</div>

<!-- Modal de confirmação -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)fecharModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3>Confirmar Agendamento</h3>
      <div class="resumo" id="modal-resumo"></div>
    </div>
    <div class="modal-body">
      <div class="fg" id="fg-nome">
        <label>Seu nome completo *</label>
        <input type="text" id="f-nome" placeholder="Nome completo" spellcheck="true" lang="pt-BR" autocomplete="name">
        <span class="errmsg">Campo obrigatório</span>
      </div>
      <div class="fg" id="fg-wpp">
        <label>WhatsApp *</label>
        <input type="tel" id="f-wpp" placeholder="(00) 00000-0000" oninput="mascTel(this)" autocomplete="tel">
        <span class="errmsg">Campo obrigatório</span>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
        <button class="btn-confirmar" id="btn-conf" onclick="confirmar()">Confirmar e Assinar Contrato →</button>
      </div>
    </div>
  </div>
</div>

<script>
const DIAS_SHORT  = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DIAS_FULL   = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MESES_GEN   = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const MESES_CURTO = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const _hojeDate = new Date(); _hojeDate.setHours(0,0,0,0);
const HOJE_STR  = _hojeDate.toISOString().slice(0, 10);
let _semana     = HOJE_STR;
let _slotSel    = null;
let _view       = 'grade';
let _dadosAtual = null;

function semDeslocar(delta) {
  const d = new Date(_semana + 'T12:00:00');
  d.setDate(d.getDate() + delta * 7);
  return d.toISOString().slice(0, 10);
}

function isPast(dataStr, hora) {
  if (dataStr < HOJE_STR) return true;
  if (dataStr === HOJE_STR) {
    const agora = new Date();
    const [h, m] = hora.split(':').map(Number);
    return h * 60 + m <= agora.getHours() * 60 + agora.getMinutes();
  }
  return false;
}

function fmtResumo(dataStr, hora) {
  const d = new Date(dataStr + 'T12:00:00');
  return `📅 ${DIAS_FULL[d.getDay()]}, ${d.getDate()} de ${MESES_GEN[d.getMonth()]} às ${hora}`;
}

function setView(v) {
  _view = v;
  document.getElementById('view-grade').style.display = v === 'grade' ? 'block' : 'none';
  document.getElementById('view-cards').style.display = v === 'cards' ? 'block' : 'none';
  document.getElementById('btn-view-grade').classList.toggle('active', v === 'grade');
  document.getElementById('btn-view-cards').classList.toggle('active', v === 'cards');
  if (_dadosAtual) {
    if (v === 'grade') renderGrade(_dadosAtual);
    else renderCards(_dadosAtual);
  }
}

// ── Visão Grade ───────────────────────────────────────────────
function renderGrade(data) {
  const table = document.getElementById('grade-table');
  if (!table) return;

  // Índice slot: data|hora → {livre}
  const idx = {};
  for (const dia of data.semana) {
    for (const s of dia.slots) idx[`${dia.data}|${s.hora}`] = s;
  }

  const dias = data.semana.map(d => d.data);

  // Slots base 08:00–11:00 e 14:00–21:00 a cada 30 min
  const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
  const toStr = n => `${String(Math.floor(n/60)).padStart(2,'0')}:${String(n%60).padStart(2,'0')}`;
  const baseSet = new Set();
  for (let m = 480; m <= 660; m += 30) baseSet.add(toStr(m));
  for (let m = 840; m <= 1260; m += 30) baseSet.add(toStr(m));
  // Adiciona horários reais fora do range
  for (const dia of data.semana) for (const s of dia.slots) baseSet.add(s.hora);
  const slots = [...baseSet].sort().map(t => ({ t, isHour: t.endsWith(':00') }));

  // Cabeçalho
  const ths = dias.map(d => {
    const dt  = new Date(d + 'T12:00:00');
    const dom = dt.getDay() === 0;
    const hj  = d === HOJE_STR;
    const cls = [hj ? 'hoje' : '', dom ? 'dom-th' : ''].filter(Boolean).join(' ');
    const label = dom
      ? `Dom`
      : `${DIAS_SHORT[dt.getDay()]} <span style="font-weight:500;opacity:.75">${dt.getDate()}/${String(dt.getMonth()+1).padStart(2,'0')}</span>`;
    return `<th class="${cls}">${label}</th>`;
  }).join('');

  let html = `<thead><tr><th class="hora-th">Hora</th>${ths}</tr></thead><tbody>`;

  let almocoDone = false;
  for (const { t, isHour } of slots) {
    const min = toMin(t);
    if (!almocoDone && min >= 840) {
      almocoDone = true;
      html += `<tr class="grade-break"><td colspan="${dias.length + 1}">— Intervalo —</td></tr>`;
    }

    const cells = dias.map(d => {
      const s = idx[`${d}|${t}`];
      const past = isPast(d, t);
      const dom  = new Date(d + 'T12:00:00').getDay() === 0;
      const extra = dom ? ' style="width:38px"' : '';

      if (!s) return `<td class="grade-cell"${extra}></td>`;
      if (!s.livre || past) {
        return `<td class="grade-cell${past ? ' passado' : ''}"${extra}>
          <span class="slot-ocupado">${s.livre && past ? '' : '🔒'}</span>
        </td>`;
      }
      return `<td class="grade-cell"${extra}>
        <button class="slot-livre" onclick="abrirModal('${d}','${t}')">${t}</button>
      </td>`;
    }).join('');

    html += `<tr class="${isHour ? 'grade-row-h' : 'grade-row-m'}">
      <td class="grade-hora">${t}</td>${cells}
    </tr>`;
  }

  html += '</tbody>';
  table.innerHTML = html;
}

// ── Visão Cards ───────────────────────────────────────────────
function renderCards(data) {
  document.getElementById('semana-grid').innerHTML = data.semana.map(dia => {
    const d = new Date(dia.data + 'T12:00:00');
    const passado = dia.data < HOJE_STR;
    const isHoje  = dia.data === HOJE_STR;

    let slotsHtml;
    if (passado) {
      slotsHtml = `<div class="dia-vazio">—</div>`;
    } else {
      const itens = dia.slots.map(s => {
        if (!s.livre || isPast(dia.data, s.hora)) {
          return s.livre ? '' : `<span class="slot-ocupado">🔒 Ocupado</span>`;
        }
        return `<button class="slot-livre" onclick="abrirModal('${dia.data}','${s.hora}')">${s.hora}</button>`;
      }).filter(Boolean);
      slotsHtml = itens.length ? itens.join('') : `<div class="dia-vazio">Sem horários</div>`;
    }

    return `
      <div class="dia-col${isHoje ? ' hoje' : ''}${passado ? ' passado' : ''}">
        <div class="dia-header">
          <div class="dow">${DIAS_SHORT[d.getDay()]}</div>
          <div class="data-num">${d.getDate()}</div>
          <div class="data-mes">${MESES_CURTO[d.getMonth()]}</div>
        </div>
        <div class="dia-slots">${slotsHtml}</div>
      </div>`;
  }).join('');
}

function renderSemana(data) {
  const de  = new Date(data.semDe  + 'T12:00:00');
  const ate = new Date(data.semAte + 'T12:00:00');
  document.getElementById('sem-label').textContent =
    `${de.getDate()} ${MESES_CURTO[de.getMonth()]} – ${ate.getDate()} ${MESES_CURTO[ate.getMonth()]} ${ate.getFullYear()}`;
  document.getElementById('btn-ant').disabled = new Date(data.semDe + 'T12:00:00') <= _hojeDate;

  _dadosAtual = data;
  if (_view === 'grade') renderGrade(data);
  else renderCards(data);
}

async function carregar() {
  try {
    const r = await fetch(`/api/agenda-publica?semana=${_semana}`);
    if (!r.ok) throw new Error();
    const data = await r.json();

    if (!document.getElementById('h-nome').dataset.loaded) {
      document.getElementById('h-nome').textContent = data.config.nome_psicologa || '';
      document.getElementById('h-crp').textContent  = data.config.crp ? `CRP ${data.config.crp}` : '';
      document.getElementById('h-nome').dataset.loaded = '1';
    }

    renderSemana(data);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display    = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = '⚠️ Erro ao carregar. Atualize a página.';
  }
}

async function navSem(delta) {
  _semana = semDeslocar(delta);
  await carregar();
}

function abrirModal(data, hora) {
  _slotSel = { data, hora };
  document.getElementById('modal-resumo').textContent = fmtResumo(data, hora);
  document.getElementById('f-nome').value = '';
  document.getElementById('f-wpp').value  = '';
  document.getElementById('fg-nome').classList.remove('erro');
  document.getElementById('fg-wpp').classList.remove('erro');
  document.getElementById('btn-conf').disabled    = false;
  document.getElementById('btn-conf').textContent = 'Confirmar e Assinar Contrato →';
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('f-nome').focus(), 50);
}

function fecharModal() { document.getElementById('modal').classList.remove('open'); }

function mascTel(el) {
  let v = el.value.replace(/\D/g, '').slice(0, 11);
  if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
  else               v = v.replace(/^(\d{2})(\d{4})(\d{0,4})$/, '($1) $2-$3');
  el.value = v;
}

async function confirmar() {
  if (!_slotSel) return;
  const nome = document.getElementById('f-nome').value.trim();
  const wpp  = document.getElementById('f-wpp').value.trim();
  let ok = true;
  [['fg-nome', nome], ['fg-wpp', wpp]].forEach(([id, val]) => {
    document.getElementById(id).classList.toggle('erro', !val);
    if (!val) ok = false;
  });
  if (!ok) return;

  const btn = document.getElementById('btn-conf');
  btn.disabled = true;
  btn.textContent = 'Reservando...';

  try {
    const r = await fetch('/api/agenda-publica/reservar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome, whatsapp: wpp, data: _slotSel.data, hora: _slotSel.hora })
    });
    const data = await r.json();
    if (!r.ok) {
      btn.disabled = false;
      btn.textContent = 'Confirmar e Assinar Contrato →';
      alert(data.error || 'Erro ao reservar. Tente novamente.');
      if (r.status === 409) { fecharModal(); await carregar(); }
      return;
    }
    window.location.href = data.contratoLink;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Confirmar e Assinar Contrato →';
    alert('Erro de conexão. Tente novamente.');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') fecharModal(); });
carregar();
</script>
</body>
</html>
