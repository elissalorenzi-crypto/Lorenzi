<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vision Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --plum:#4A3728;--plum-mid:#6B4F3A;
  --rose:#C4956A;--rose-pale:#FBF3F9;
  --border:#E8D5E4;--bg:#FFFFFF;--bg-alt:#FBF3F9;
  --muted:#9A7D8E;--text:#4A3728;
  --shadow:0 2px 8px rgba(74,55,40,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-alt);min-height:100vh;color:var(--text)}

header{background:linear-gradient(135deg,var(--plum) 0%,var(--plum-mid) 100%);color:#fff;padding:26px 16px;text-align:center}
header h1{font-size:22px;font-weight:800;margin-bottom:4px;letter-spacing:-.3px}
#nome-cliente{font-size:14px;opacity:.85;margin-top:4px}

.container{max-width:960px;margin:0 auto;padding:16px}

.grid{
  columns:2 200px;
  column-gap:10px;
}
@media(min-width:640px){ .grid{ columns:3 220px; } }
.grid img{
  width:100%;
  display:block;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:var(--shadow);
  break-inside:avoid;
}

#loading,#erro-msg{display:none;text-align:center;padding:60px 20px}
#loading .spin{width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--rose);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.erro-msg{color:#8B3A3A}

.vazio{text-align:center;padding:60px 20px;color:var(--muted)}

.btns-acao{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.btn-imprimir,.btn-pdf,.btn-img{padding:11px 22px;background:linear-gradient(135deg,var(--plum) 0%,var(--plum-mid) 100%);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-pdf{background:var(--rose)}
.btn-img{background:#2A6B4A}
.btn-imprimir:hover,.btn-pdf:hover,.btn-img:hover{opacity:.9}
.btn-imprimir:disabled,.btn-pdf:disabled,.btn-img:disabled{opacity:.6;cursor:not-allowed}

/* Impressão / salvar como PDF em A4 */
@page{ size:A4; margin:14mm; }
@media print{
  body{ background:#fff }
  header{ background:none!important; color:var(--plum)!important; padding:0 0 10px 0 }
  .btns-acao{ display:none }
  .container{ max-width:none; padding:0 }
  .grid{ columns:3 180px }
  .grid img{ box-shadow:none; break-inside:avoid; page-break-inside:avoid }
}
</style>
</head>
<body>

<header>
  <h1 id="titulo-board">🖼️ Vision Board</h1>
  <div id="nome-cliente"></div>
</header>

<div class="container">
  <div id="loading" style="display:block"><div class="spin"></div><p>Carregando...</p></div>
  <div id="erro-msg" class="erro-msg"></div>
  <div class="btns-acao" id="btns-acao" style="display:none">
    <button class="btn-imprimir" id="btn-imprimir" onclick="window.print()">🖨️ Imprimir (A4)</button>
    <button class="btn-pdf" id="btn-pdf" onclick="gerarPDF()">📄 Gerar PDF</button>
    <button class="btn-img" id="btn-img" onclick="gerarImagem()">🖼️ Gerar Imagem</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<script>
const TOKEN = new URLSearchParams(location.search).get('t') || '';

async function init() {
  if (!TOKEN) { mostrarErro('Link inválido.'); return; }
  try {
    const r = await fetch('/api/vision-board/info/' + TOKEN);
    if (!r.ok) { mostrarErro('Link inválido ou expirado.'); return; }
    const info = await r.json();
    document.title = info.titulo || 'Vision Board';
    document.getElementById('titulo-board').textContent = '🖼️ ' + (info.titulo || 'Vision Board');
    document.getElementById('nome-cliente').textContent = info.paciente_nome || '';
    const grid = document.getElementById('grid');
    if (!info.imagens || !info.imagens.length) {
      grid.outerHTML = '<div class="vazio">Nenhuma imagem adicionada ainda.</div>';
    } else {
      grid.innerHTML = info.imagens.map(src => '<img src="' + src + '" loading="lazy" alt="">').join('');
      document.getElementById('btns-acao').style.display = 'flex';
    }
    document.getElementById('loading').style.display = 'none';
  } catch(e) { mostrarErro('Erro ao carregar. Tente novamente.'); }
}

function carregarImagem(src) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = src;
  });
}

async function gerarPDF() {
  const btn = document.getElementById('btn-pdf');
  const imgs = Array.from(document.querySelectorAll('#grid img'));
  if (!imgs.length) return;
  btn.disabled = true;
  btn.textContent = 'Gerando PDF...';
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const margin = 10;
    const cols = 2, rows = 3, perPage = cols * rows;
    const pageW = doc.internal.pageSize.getWidth() - margin * 2;
    const pageH = doc.internal.pageSize.getHeight() - margin * 2;
    const cellW = pageW / cols, cellH = pageH / rows, pad = 3;

    for (let i = 0; i < imgs.length; i++) {
      const posNaPagina = i % perPage;
      if (i > 0 && posNaPagina === 0) doc.addPage();
      const col = posNaPagina % cols;
      const row = Math.floor(posNaPagina / cols);
      const cellX = margin + col * cellW;
      const cellY = margin + row * cellH;

      const im = await carregarImagem(imgs[i].src);
      const canvas = document.createElement('canvas');
      canvas.width = im.naturalWidth;
      canvas.height = im.naturalHeight;
      canvas.getContext('2d').drawImage(im, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);

      const maxW = cellW - pad * 2, maxH = cellH - pad * 2;
      let w = maxW, h = w * im.naturalHeight / im.naturalWidth;
      if (h > maxH) { h = maxH; w = h * im.naturalWidth / im.naturalHeight; }
      const x = cellX + (cellW - w) / 2;
      const y = cellY + (cellH - h) / 2;
      doc.addImage(dataUrl, 'JPEG', x, y, w, h);
    }

    doc.save(nomeArquivoAtual() + '.pdf');
  } catch(e) {
    alert('Erro ao gerar o PDF: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '📄 Gerar PDF';
  }
}

function nomeArquivoAtual() {
  return (document.getElementById('titulo-board').textContent || 'vision-board')
    .replace(/[^\p{L}\p{N}\- ]/gu, '').trim() || 'vision-board';
}

async function gerarImagem() {
  const btn = document.getElementById('btn-img');
  btn.disabled = true;
  btn.textContent = 'Gerando imagem...';
  try {
    const canvas = await html2canvas(document.getElementById('grid'), {
      backgroundColor: '#ffffff',
      useCORS: true,
      scale: 2
    });
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = nomeArquivoAtual() + '.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
  } catch(e) {
    alert('Erro ao gerar a imagem: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🖼️ Gerar Imagem';
  }
}

function mostrarErro(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('erro-msg');
  el.style.display = 'block';
  el.textContent = msg;
}

init();
</script>
</body>
</html>
